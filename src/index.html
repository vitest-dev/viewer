<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vitest Viewer</title>
    <link rel="icon" href="https://vitest.dev/logo-without-border.svg" type="image/svg+xml" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #drop {
        padding: 3rem;
        text-align: center;
        border: 3px dashed #b2d9c2;
        background: #f7fcf9;
        margin: 0.5rem 1rem;
        border-radius: 8px;
        transition:
          border-color 0.2s,
          background 0.2s;
        cursor: pointer;
      }
      #drop:hover,
      #drop.over {
        border-color: #008039;
        background: #f0faf4;
      }

      iframe {
        flex: 1;
        border: none;
        margin: 0.5rem;
        border: 1px solid #eee;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem 0 1rem;
      "
    >
      <a
        href="."
        style="
          display: flex;
          align-items: center;
          gap: 0.4rem;
          font-size: 0.9rem;
          font-weight: 600;
          color: inherit;
          text-decoration: none;
        "
        >Vitest Viewer</a
      >
      <div style="flex: 1"></div>
      <div id="status" style="font-size: 0.8rem; color: #999; display: none">
        Status: <span id="status-msg"></span>
      </div>
      <a
        href="https://github.com/vitest-dev/viewer"
        style="font-size: 0.8rem; color: #999; text-decoration: none"
        target="_blank"
        rel="noopener"
        >Source code</a
      >
    </div>
    <input type="file" id="file-input" accept=".zip" hidden />
    <div id="drop" role="button" tabindex="0">
      <div>Drag &amp; drop or <span style="color: #008039">click to upload</span></div>
      <div style="font-size: 0.8rem; color: #999; margin-top: 0.4rem">.zip files only</div>
    </div>
    <div
      id="example"
      style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 0.5rem"
    >
      or try an
      <a
        href="?url=https://cdn.jsdelivr.net/gh/vitest-dev/viewer@main/docs/assets/vitest-html-reporter.zip"
        style="color: #008039"
        >example</a
      >
    </div>
    <div
      id="fetch-error"
      hidden
      style="text-align: center; font-size: 0.85rem; color: #c00; margin-top: 1rem"
    ></div>
    <iframe id="viewer" hidden></iframe>

    <script type="module">
      import { unzipSync } from "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js";

      const CACHE_NAME = "zipview-v1";
      const PREFIX = "/zipview/site/";
      const $drop = document.getElementById("drop");
      const $status = document.getElementById("status");
      const $statusMsg = document.getElementById("status-msg");
      const $viewer = document.getElementById("viewer");

      function setStatus(msg) {
        $statusMsg.textContent = msg;
        $status.style.display = "";
      }

      // Register SW
      if ("serviceWorker" in navigator) {
        await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;
        setStatus("Service worker ready.");
      } else {
        setStatus("Service workers not supported.");
      }

      const $fileInput = document.getElementById("file-input");
      const $example = document.getElementById("example");

      // Auto-load from ?url= param
      const paramUrl = new URLSearchParams(location.search).get("url");
      if (paramUrl) {
        try {
          await handleUrl(paramUrl);
        } catch (err) {
          const { hostname, pathname } = new URL(paramUrl);
          const lastSegment = pathname.split("/").filter(Boolean).pop() || "";
          const displayUrl = lastSegment ? `${hostname}/\u2026/${lastSegment}` : hostname;

          const $fetchError = document.getElementById("fetch-error");
          const message =
            err instanceof TypeError ? `${err.message} (likely blocked by CORS)` : err.message;
          $fetchError.innerHTML = `
            <div>${message}</div>
            <div style="margin-top:0.3rem;color:#666">
              Try opening <a href="${paramUrl}" style="color:#008039">${displayUrl}</a> directly in your browser, download the file, and drop it here.
            </div>`;
          $fetchError.hidden = false;
          setStatus(`Fetch Error: ${message}`);
        }
      }

      async function handleUrl(url) {
        setStatus(`Fetching ${new URL(url).pathname.split("/").pop()}...`);
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const buf = await res.arrayBuffer();
        await handleBuffer(buf, url.split("/").pop());
      }

      async function handleFile(file) {
        if (!file) return;
        const buf = await file.arrayBuffer();
        await handleBuffer(buf, file.name);
      }

      async function handleBuffer(buf, name) {
        setStatus(`Unzipping ${name}...`);
        const entries = unzipSync(new Uint8Array(buf));

        // Clear old cache
        await caches.delete(CACHE_NAME);
        const cache = await caches.open(CACHE_NAME);

        const mimeTypes = {
          html: "text/html",
          css: "text/css",
          js: "application/javascript",
          mjs: "application/javascript",
          json: "application/json",
          svg: "image/svg+xml",
          png: "image/png",
          jpg: "image/jpeg",
          jpeg: "image/jpeg",
          gif: "image/gif",
          woff: "font/woff",
          woff2: "font/woff2",
          ico: "image/x-icon",
        };

        let fileCount = 0;
        let rootPrefix = "";

        // Detect common root directory in zip
        const paths = Object.keys(entries);
        if (paths.length > 0) {
          const first = paths[0];
          const slash = first.indexOf("/");
          if (slash > 0) {
            const candidate = first.substring(0, slash + 1);
            if (paths.every((p) => p.startsWith(candidate))) {
              rootPrefix = candidate;
            }
          }
        }

        for (const [path, data] of Object.entries(entries)) {
          // Skip directories (empty data)
          if (path.endsWith("/")) continue;

          const ext = path.split(".").pop()?.toLowerCase() || "";
          const contentType = mimeTypes[ext] || "application/octet-stream";

          // Strip common root prefix so index.html is at the top level
          const servePath = rootPrefix ? path.substring(rootPrefix.length) : path;
          const url = new URL(PREFIX + servePath, location.origin);
          const response = new Response(data, {
            headers: { "Content-Type": contentType },
          });
          await cache.put(url.href, response);
          fileCount++;
        }

        setStatus(`Cached ${fileCount} files. Loading...`);
        $drop.hidden = true;
        $example.hidden = true;
        document.getElementById("fetch-error").hidden = true;
        $viewer.hidden = false;
        $viewer.src = PREFIX;
        $viewer.onload = () => setStatus(`Cached ${fileCount} files.`);
      }

      // Drag and drop
      $drop.addEventListener("dragover", (e) => {
        e.preventDefault();
        $drop.classList.add("over");
      });
      $drop.addEventListener("dragleave", () => $drop.classList.remove("over"));
      $drop.addEventListener("drop", async (e) => {
        e.preventDefault();
        $drop.classList.remove("over");
        handleFile(e.dataTransfer.files[0]);
      });

      // File input
      $fileInput.addEventListener("change", () => handleFile($fileInput.files[0]));

      // Click / keyboard to open picker
      $drop.addEventListener("click", () => $fileInput.click());
      $drop.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") $fileInput.click();
      });
    </script>
  </body>
</html>
