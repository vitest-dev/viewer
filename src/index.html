<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Zipview</title>
    <link
      rel="icon"
      href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ctext y="80" font-size="80"%3E🤐%3C/text%3E%3C/svg%3E'
    />
    <script type="module" src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #drop {
        padding: 3rem;
        text-align: center;
        border: 3px dashed #ccc;
        margin: 0.5rem 1rem;
        border-radius: 8px;
        transition:
          border-color 0.2s,
          background 0.2s;
        cursor: pointer;
      }
      #drop:hover,
      #drop.over {
        border-color: #646cff;
        background: #f5f5ff;
      }

      iframe {
        flex: 1;
        border: none;
        margin: 0.5rem;
        border: 1px solid #eee;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem 0 1rem;
      "
    >
      <a href="." style="font-size: 0.9rem; font-weight: 600; color: inherit; text-decoration: none"
        >🤐 Zipview</a
      >
      <div style="flex: 1"></div>
      <div id="status" style="font-size: 0.8rem; color: #999; display: none">
        Status: <span id="status-msg"></span>
      </div>
      <a
        href="https://github.com/hi-ogawa/zipview"
        style="font-size: 0.8rem; color: #999; text-decoration: none"
        target="_blank"
        rel="noopener"
        >Source code</a
      >
    </div>
    <input type="file" id="file-input" accept=".zip" hidden />
    <div id="drop" role="button" tabindex="0">
      <div>Drag &amp; drop or <span style="color: #646cff">click to upload</span></div>
      <div style="font-size: 0.8rem; color: #999; margin-top: 0.4rem">.zip files only</div>
      <div style="font-size: 0.8rem; color: #999; margin-top: 0.8rem">
        or try an
        <a
          href="?url=https://cdn.jsdelivr.net/gh/hi-ogawa/zipview@main/docs/assets/vitest-html-reporter.zip"
          style="color: #646cff"
          onclick="event.stopPropagation()"
          >example</a
        >
      </div>
    </div>
    <iframe id="viewer" hidden></iframe>

    <script type="module">
      import { unzipSync } from "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js";

      const CACHE_NAME = "zipview-v1";
      const PREFIX = "/zipview/site/";
      const $drop = document.getElementById("drop");
      const $status = document.getElementById("status");
      const $statusMsg = document.getElementById("status-msg");
      const $viewer = document.getElementById("viewer");

      function setStatus(msg) {
        $statusMsg.textContent = msg;
        $status.style.display = "";
      }

      // Register SW
      if ("serviceWorker" in navigator) {
        await navigator.serviceWorker.register("./sw.js");
        await navigator.serviceWorker.ready;
        setStatus("Service worker ready.");
      } else {
        setStatus("Service workers not supported.");
      }

      const $fileInput = document.getElementById("file-input");

      // Auto-load from ?url= param
      const paramUrl = new URLSearchParams(location.search).get("url");
      if (paramUrl) handleUrl(paramUrl);

      async function handleUrl(url) {
        setStatus(`Fetching ${new URL(url).pathname.split("/").pop()}...`);
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Fetch failed: ${res.status}`);
        const buf = await res.arrayBuffer();
        await handleBuffer(buf, url.split("/").pop());
      }

      async function handleFile(file) {
        if (!file) return;
        const buf = await file.arrayBuffer();
        await handleBuffer(buf, file.name);
      }

      async function handleBuffer(buf, name) {
        setStatus(`Unzipping ${name}...`);
        const entries = unzipSync(new Uint8Array(buf));

        // Clear old cache
        await caches.delete(CACHE_NAME);
        const cache = await caches.open(CACHE_NAME);

        const mimeTypes = {
          html: "text/html",
          css: "text/css",
          js: "application/javascript",
          mjs: "application/javascript",
          json: "application/json",
          svg: "image/svg+xml",
          png: "image/png",
          jpg: "image/jpeg",
          jpeg: "image/jpeg",
          gif: "image/gif",
          woff: "font/woff",
          woff2: "font/woff2",
          ico: "image/x-icon",
        };

        let fileCount = 0;
        let rootPrefix = "";

        // Detect common root directory in zip
        const paths = Object.keys(entries);
        if (paths.length > 0) {
          const first = paths[0];
          const slash = first.indexOf("/");
          if (slash > 0) {
            const candidate = first.substring(0, slash + 1);
            if (paths.every((p) => p.startsWith(candidate))) {
              rootPrefix = candidate;
            }
          }
        }

        for (const [path, data] of Object.entries(entries)) {
          // Skip directories (empty data)
          if (path.endsWith("/")) continue;

          const ext = path.split(".").pop()?.toLowerCase() || "";
          const contentType = mimeTypes[ext] || "application/octet-stream";

          // Strip common root prefix so index.html is at the top level
          const servePath = rootPrefix ? path.substring(rootPrefix.length) : path;
          const url = new URL(PREFIX + servePath, location.origin);
          const response = new Response(data, {
            headers: { "Content-Type": contentType },
          });
          await cache.put(url.href, response);
          fileCount++;
        }

        setStatus(`Cached ${fileCount} files. Loading...`);
        $drop.hidden = true;
        $viewer.hidden = false;
        $viewer.src = PREFIX;
      }

      // Drag and drop
      $drop.addEventListener("dragover", (e) => {
        e.preventDefault();
        $drop.classList.add("over");
      });
      $drop.addEventListener("dragleave", () => $drop.classList.remove("over"));
      $drop.addEventListener("drop", async (e) => {
        e.preventDefault();
        $drop.classList.remove("over");
        handleFile(e.dataTransfer.files[0]);
      });

      // File input
      $fileInput.addEventListener("change", () => handleFile($fileInput.files[0]));

      // Click / keyboard to open picker
      $drop.addEventListener("click", () => $fileInput.click());
      $drop.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") $fileInput.click();
      });
    </script>
  </body>
</html>
