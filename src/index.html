<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vitest Viewer</title>
    <link rel="icon" href="https://vitest.dev/logo-without-border.svg" type="image/svg+xml" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #app {
        display: contents;
      }
      #drop {
        padding: 3rem;
        text-align: center;
        border: 3px dashed #b2d9c2;
        background: #f7fcf9;
        margin: 0.5rem 1rem;
        border-radius: 8px;
        transition:
          border-color 0.2s,
          background 0.2s;
        cursor: pointer;
      }
      #drop:hover,
      #drop.over {
        border-color: #008039;
        background: #f0faf4;
      }
      iframe {
        flex: 1;
        border: 1px solid #eee;
        margin: 0.5rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { h, render, Fragment } from "https://esm.sh/preact@10";
      import { useState, useEffect, useRef } from "https://esm.sh/preact@10/hooks";
      import { unzip } from "https://esm.sh/fflate@0.8.2";

      const CACHE_NAME = "zipview-v1";
      const PREFIX = "/zipview/site/";

      const MIME_TYPES = {
        html: "text/html",
        css: "text/css",
        js: "application/javascript",
        mjs: "application/javascript",
        json: "application/json",
        svg: "image/svg+xml",
        png: "image/png",
        jpg: "image/jpeg",
        jpeg: "image/jpeg",
        gif: "image/gif",
        woff: "font/woff",
        woff2: "font/woff2",
        ico: "image/x-icon",
      };

      async function registerSW() {
        if (!("serviceWorker" in navigator)) throw new Error("Service workers not supported");
        await navigator.serviceWorker.register("./sw.js");
        // .ready waits until an active SW controls the page.
        // Combined with skipWaiting+clients.claim in sw.js, this ensures a
        // newly deployed sw.js is active before we write anything to the cache.
        await navigator.serviceWorker.ready;
      }

      async function cacheZip(buf) {
        const entries = await new Promise((resolve, reject) =>
          unzip(new Uint8Array(buf), (err, data) => (err ? reject(err) : resolve(data))),
        );

        const paths = Object.keys(entries);
        let rootPrefix = "";
        if (paths.length > 0) {
          const first = paths[0];
          const slash = first.indexOf("/");
          if (slash > 0) {
            const candidate = first.substring(0, slash + 1);
            if (paths.every((p) => p.startsWith(candidate))) rootPrefix = candidate;
          }
        }

        await caches.delete(CACHE_NAME);
        const cache = await caches.open(CACHE_NAME);

        await Promise.all(
          Object.entries(entries)
            .filter(([path]) => !path.endsWith("/"))
            .map(([path, data]) => {
              const ext = path.split(".").pop()?.toLowerCase() ?? "";
              const contentType = MIME_TYPES[ext] ?? "application/octet-stream";
              const servePath = rootPrefix ? path.substring(rootPrefix.length) : path;
              const url = new URL(PREFIX + servePath, location.origin);
              return cache.put(
                url.href,
                new Response(data, { headers: { "Content-Type": contentType } }),
              );
            }),
        );

        return paths.filter((p) => !p.endsWith("/")).length;
      }

      function Header({ statusMsg }) {
        return h(
          "div",
          {
            style: {
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              gap: "0.5rem",
              padding: "0.5rem 1rem 0",
            },
          },
          h(
            "a",
            {
              href: ".",
              style: {
                fontSize: "0.9rem",
                fontWeight: "600",
                color: "inherit",
                textDecoration: "none",
              },
            },
            "Vitest Viewer",
          ),
          h("div", { style: { flex: "1" } }),
          statusMsg != null &&
            h(
              "div",
              { style: { fontSize: "0.8rem", color: "#999" }, "data-testid": "status" },
              "Status: ",
              h("span", null, statusMsg),
            ),
          h(
            "a",
            {
              href: "https://github.com/vitest-dev/viewer",
              style: { fontSize: "0.8rem", color: "#999", textDecoration: "none" },
              target: "_blank",
              rel: "noopener",
            },
            "Source code",
          ),
        );
      }

      function DropZone({ onFile }) {
        const [over, setOver] = useState(false);
        const inputRef = useRef(null);

        return h(
          "div",
          {
            id: "drop",
            class: over ? "over" : "",
            role: "button",
            tabIndex: "0",
            onDragOver: (e) => {
              e.preventDefault();
              setOver(true);
            },
            onDragLeave: () => setOver(false),
            onDrop: (e) => {
              e.preventDefault();
              setOver(false);
              onFile(e.dataTransfer.files[0]);
            },
            onClick: () => inputRef.current.click(),
            onKeyDown: (e) => (e.key === "Enter" || e.key === " ") && inputRef.current.click(),
          },
          h(
            "div",
            null,
            "Drag & drop or ",
            h("span", { style: { color: "#008039" } }, "click to upload"),
          ),
          h(
            "div",
            { style: { fontSize: "0.8rem", color: "#999", marginTop: "0.4rem" } },
            ".zip files only",
          ),
          h("input", {
            ref: inputRef,
            type: "file",
            accept: ".zip",
            hidden: true,
            onChange: (e) => onFile(e.target.files[0]),
          }),
        );
      }

      function FetchError({ error }) {
        return h(
          "div",
          { style: { textAlign: "center", fontSize: "0.85rem", color: "#c00", marginTop: "1rem" } },
          h("div", null, error.message),
          h(
            "div",
            { style: { marginTop: "0.3rem", color: "#666" } },
            "Try opening ",
            h("a", { href: error.url, style: { color: "#008039" } }, error.displayUrl),
            " directly in your browser, download the file, and drop it here.",
          ),
        );
      }

      function App() {
        const [statusMsg, setStatusMsg] = useState("Registering service worker...");
        const [loaded, setLoaded] = useState(false);
        const [fileCount, setFileCount] = useState(0);
        const [fetchError, setFetchError] = useState(null);

        async function handleBuffer(buf, name) {
          setStatusMsg(`Unzipping ${name}...`);
          let count;
          try {
            count = await cacheZip(buf);
          } catch (err) {
            setStatusMsg(`Zip Error: ${err.message}`);
            return;
          }
          setFileCount(count);
          setStatusMsg(`Cached ${count} files. Loading...`);
          setLoaded(true);
        }

        async function handleFile(file) {
          if (!file) return;
          await handleBuffer(await file.arrayBuffer(), file.name);
        }

        useEffect(() => {
          async function init() {
            try {
              await registerSW();
              setStatusMsg("Service worker ready.");
            } catch (err) {
              setStatusMsg(err.message);
              return;
            }

            const paramUrl = new URLSearchParams(location.search).get("url");
            if (!paramUrl) return;

            try {
              const name = paramUrl.split("/").pop();
              setStatusMsg(`Fetching ${name}...`);
              const res = await fetch(paramUrl);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              await handleBuffer(await res.arrayBuffer(), name);
            } catch (err) {
              const { hostname, pathname } = new URL(paramUrl);
              const lastSegment = pathname.split("/").filter(Boolean).pop() || "";
              const displayUrl = lastSegment ? `${hostname}/\u2026/${lastSegment}` : hostname;
              const message =
                err instanceof TypeError ? `${err.message} (likely blocked by CORS)` : err.message;
              setFetchError({ message, url: paramUrl, displayUrl });
              setStatusMsg(`Fetch Error: ${message}`);
            }
          }
          init();
        }, []);

        return h(
          Fragment,
          null,
          h(Header, { statusMsg }),
          !loaded && h(DropZone, { onFile: handleFile }),
          !loaded &&
            h(
              "div",
              {
                id: "example",
                style: {
                  textAlign: "center",
                  fontSize: "0.8rem",
                  color: "#999",
                  marginTop: "0.5rem",
                },
              },
              "or try an ",
              h(
                "a",
                {
                  href: "?url=https://cdn.jsdelivr.net/gh/vitest-dev/viewer@main/docs/assets/vitest-html-reporter.zip",
                  style: { color: "#008039" },
                },
                "example",
              ),
            ),
          fetchError && h(FetchError, { error: fetchError }),
          loaded &&
            h("iframe", { src: PREFIX, onLoad: () => setStatusMsg(`Cached ${fileCount} files.`) }),
        );
      }

      function main() {
        render(h(App, null), document.getElementById("app"));
      }

      main();
    </script>
  </body>
</html>
